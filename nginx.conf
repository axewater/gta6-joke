server {
    server_name gta6joke.pleasewaitloading.com;

    root /var/www/gta6joke;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gta6joke.pleasewaitloading.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gta6joke.pleasewaitloading.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = gta6joke.pleasewaitloading.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name gta6joke.pleasewaitloading.com;
    return 404; # managed by Certbot


}